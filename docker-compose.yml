# ============================================================
# DOCKER COMPOSE — Telco Churn Prediction System
# Starts API (port 8000) + Dashboard (port 8501) together
#
# Usage:
#   docker-compose up --build          # build + start both
#   docker-compose up api              # API only
#   docker-compose up dashboard        # Dashboard only
#   docker-compose down                # stop all
# ============================================================

version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn_api
    ports:
      - "8000:8000"
    volumes:
      # Mount model artifacts so API uses trained model from host
      - ./churn_models:/app/churn_models:ro
      # Mount logs writable so prediction logs persist on host
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: churn_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./churn_models:/app/churn_models:ro
      - ./logs:/app/logs:ro
    environment:
      - CHURN_API_URL=http://api:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
